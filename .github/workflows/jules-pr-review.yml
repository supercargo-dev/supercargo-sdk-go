name: Jules AI PR Review
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Invoke Jules Code Review
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: ${{ github.head_ref }}
          REPO_FULL_NAME: ${{ github.repository }}
          USER_PROMPT: |
            You are an expert Principal Go Engineer reviewing this Pull Request for the Supercargo Go SDK.
            This project is a strict Go SDK consumed by downstream applications.
            
            Please review the code changes and provide actionable feedback, or create commits to fix issues.
            
            Focus your review strictly on:
            1. **SDK Usability & Idiomatic Go:** Are the API contracts clean and intuitive? Is `context.Context` used appropriately for cancellation/timeouts? Are errors strongly typed and handled gracefully?
            2. **Backward Compatibility:** Does this PR break existing API contracts? Ensure public structs and methods maintain compatibility.
            3. **Concurrency:** Look for race conditions, proper goroutine synchronization, and thread-safe data access.
            4. **Security & Reliability:** Check for insecure defaults, unvalidated inputs, or mishandling of sensitive data before passing it to backend services.
            5. **Testability:** Are the changes well-tested? Are interfaces designed to allow consumer mocking?
            
            Do not nitpick minor formatting if it passes the standard Go linter (`gofmt`/`golangci-lint`). Focus on architectural soundness, robustness, and developer experience for SDK consumers.
        run: |
          jq -n \
            --arg prompt "$USER_PROMPT" \
            --arg branch "$STARTING_BRANCH" \
            --arg repo "$REPO_FULL_NAME" \
            '{
              "prompt": $prompt,
              "sourceContext": {
                "source": "sources/github/\($repo)",
                "githubRepoContext": {
                  "startingBranch": $branch
                }
              },
              "requirePlanApproval": false,
              "automationMode": "AUTO_CREATE_PR"
            }' > jules_payload.json

          curl -s -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d @jules_payload.json
