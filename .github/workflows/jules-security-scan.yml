name: Jules Daily Security Scan
on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3 AM UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Invoke Jules Security Scan
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          STARTING_BRANCH: 'main'
          REPO_FULL_NAME: ${{ github.repository }}
          USER_PROMPT: |
            You are a senior adversarial security researcher. Your objective is to proactively hunt for vulnerabilities in the Supercargo Go SDK.
            
            Thoroughly scan the codebase and implement fixes for any of the following if found:
            - **Input Validation:** Are malicious inputs handled safely before being sent to backend APIs (e.g., preventing injection attacks via the SDK)?
            - **Secrets:** Hardcoded credentials, test API keys leaked in production code, or improper logging of sensitive auth tokens.
            - **State Safety:** Race conditions or unsafe concurrency patterns in the SDK's internal state management.
            - **Cryptography/TLS:** Insecure TLS defaults or weak cryptographic implementations if applicable.
            
            If you find a high or critical severity vulnerability, open a pull request immediately with a targeted, minimal fix. 
            Do not make changes to business logic unrelated to the security fix. Ensure all existing tests pass and the public API remains backward compatible.
        run: |
          jq -n \
            --arg prompt "$USER_PROMPT" \
            --arg branch "$STARTING_BRANCH" \
            --arg repo "$REPO_FULL_NAME" \
            '{
              "prompt": $prompt,
              "sourceContext": {
                "source": "sources/github/\($repo)",
                "githubRepoContext": {
                  "startingBranch": $branch
                }
              },
              "requirePlanApproval": false,
              "automationMode": "AUTO_CREATE_PR"
            }' > jules_payload.json

          curl --fail -s -S -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: $JULES_API_KEY" \
            -d @jules_payload.json
